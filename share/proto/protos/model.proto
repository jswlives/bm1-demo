syntax = "proto3";
package model;



message PlayerBase{
    uint64 player_id = 1;
    string player_name = 2;
    uint32 player_level = 3;
}

message PlayerBagItem{
    uint32 item_id = 1;
    uint32 item_count = 2;
}

enum PlayerBagMoneyType{
    PLAYER_BAG_MONEY_TYPE_UNSPECIFIED = 0;
    PLAYER_BAG_MONEY_TYPE_GOLD = 1;
    PLAYER_BAG_MONEY_TYPE_DIAMOND = 2;
}

message PlayerBagMoney{
    PlayerBagMoneyType money_type = 1;
    uint32 money_count = 2;
}

message PlayerBag{
    repeated PlayerBagItem items = 1;
    repeated PlayerBagMoney money = 2;
}

message PlayerSkill {
    uint32 skill_id = 1;
    uint32 skill_level = 2;
}

message PlayerSkillData {
    uint32 skill_points = 1;
    repeated PlayerSkill skills = 2;
}

message PlayerEquip {
    uint32 equip_id = 1;
    uint32 equip_level = 2;
}

message PlayerEquipData {
    repeated PlayerEquip equips = 1;
}

message PlayerData {
    PlayerBase player_base = 1;
    PlayerBag player_bag = 2;
    PlayerSkillData player_skill = 3;
    PlayerEquipData player_equip = 4;
}

enum DeltaOp {
  DELTA_OP_UNSPECIFIED = 0;
  DELTA_OP_UPSERT = 1;
  DELTA_OP_DELETE = 2;
}

message PlayerBaseDelta {
  optional uint32 player_level = 1;
}

message PlayerBagMoneyDelta {
  PlayerBagMoneyType money_type = 1;
  uint32 money_count = 2;
}

message PlayerBagItemDelta {
  DeltaOp op = 1;
  uint32 item_id = 2;
  uint32 item_count = 3;
}

message PlayerBagDelta {
  repeated PlayerBagMoneyDelta money_changes = 1;
  repeated PlayerBagItemDelta item_changes = 2;
}

message PlayerSkillDelta {
  DeltaOp op = 1;
  uint32 skill_id = 2;
  uint32 skill_level = 3;
}

message PlayerSkillDataDelta {
  optional uint32 skill_points = 1;
  repeated PlayerSkillDelta skill_changes = 2;
}

message PlayerEquipDelta {
  DeltaOp op = 1;
  uint32 equip_id = 2;
  uint32 equip_level = 3;
}

message PlayerEquipDataDelta {
  repeated PlayerEquipDelta equip_changes = 1;
}

message PlayerDataDelta {
  optional PlayerBaseDelta base = 1;
  optional PlayerBagDelta bag = 2;
  optional PlayerSkillDataDelta skill = 3;
  optional PlayerEquipDataDelta equip = 4;
}